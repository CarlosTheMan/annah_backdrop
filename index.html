<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Annah Arias Backdrop</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, sans-serif;
      background: #98ff98;
      color: #1a1a1a;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 32px;
    }
    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      text-align: center;
    }
    #status {
      font-size: 0.85rem;
      color: #2d6a2d;
      text-align: center;
    }
    #connect {
      padding: 14px 36px;
      background: #16a34a;
      color: #fff;
      border: none;
      border-radius: 99px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    #connect:disabled { background: #a3c9a3; color: #5a8a5a; }

    .controls {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 100%;
    }
    button.cmd {
      width: 100%;
      padding: 26px;
      font-size: 1.2rem;
      font-weight: 700;
      border: none;
      border-radius: 16px;
      cursor: pointer;
    }
    button.cmd:active { opacity: 0.75; }
    #raise { background: #16a34a; color: #fff; }
    #stop  { background: #475569; color: #fff; }
    #lower { background: #dc2626; color: #fff; }
  </style>
</head>
<body>

  <h1>Annah Arias Backdrop</h1>
  <div id="status">Not connected</div>
  <button id="connect">Connect</button>

  <div class="controls" id="controls">
    <button class="cmd" id="raise" onpointerdown="send(1)">▲ Raise Backdrop</button>
    <button class="cmd" id="stop"  onpointerdown="send(0)">■ Stop</button>
    <button class="cmd" id="lower" onpointerdown="send(-1)">▼ Lower Backdrop</button>
  </div>

  <script>
    const SERVICE = "12345678-1234-5678-1234-56789abcdef0";
    const CHAR    = "12345678-1234-5678-1234-56789abcdef1";

    let characteristic = null;

    document.getElementById("connect").addEventListener("click", async () => {
      try {
        setStatus("Scanning...");
        const device = await navigator.bluetooth.requestDevice({
          filters: [{ name: "PicoMotor" }],
          optionalServices: [SERVICE]
        });

        device.addEventListener("gattserverdisconnected", onDisconnect);
        setStatus("Connecting...");

        const server  = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE);
        characteristic = await service.getCharacteristic(CHAR);

        setStatus("Connected ✓");
        document.getElementById("connect").disabled = true;
        document.getElementById("controls").style.display = "flex";

      } catch (e) {
        setStatus("Failed: " + e.message);
      }
    });

    function onDisconnect() {
      characteristic = null;
      setStatus("Disconnected — tap to reconnect");
      document.getElementById("connect").disabled = false;
      document.getElementById("controls").style.display = "none";
    }

    async function send(dir) {
      if (!characteristic) return;
      const msg   = `${dir},100`;
      const bytes = new TextEncoder().encode(msg);
      try {
        await characteristic.writeValueWithoutResponse(bytes);
        setStatus(`Sent: ${msg}`);
      } catch (e) {
        setStatus("Send failed: " + e.message);
      }
    }

    function setStatus(msg) {
      document.getElementById("status").textContent = msg;
    }
  </script>

</body>
</html>
